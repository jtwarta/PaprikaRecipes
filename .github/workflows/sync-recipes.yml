name: Sync Recipes to Paprika

on:
  push:
    paths:
      - 'recipes/*.json'

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests

      - name: Sync recipes to Paprika
        env:
          PAPRIKA_EMAIL: ${{ secrets.PAPRIKA_EMAIL }}
          PAPRIKA_PASSWORD: ${{ secrets.PAPRIKA_PASSWORD }}
        run: python sync_to_paprika.py

      - name: Commit synced file moves
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add recipes/
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Move synced recipes to synced/ folder"
            git push
          fi
